apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-prod
  namespace: argocd
spec:
  project: jenkins
  sources:
    - repoURL: https://github.com/opensearch-project/jenkins-gitops
      targetRevision: main
      path: base/jenkins
      helm:
        valueFiles:
          - ../../production/values.yaml
    - repoURL: https://github.com/opensearch-project/jenkins-gitops
      targetRevision: main
      path: custom-resources/production
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
