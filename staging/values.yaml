                      numExecutors: "1"
                      remoteAdmin: "ec2-user"
                      remoteFS: "/var/jenkins"
                      securityGroups: "jenkins-worker"
                      subnetId: "subnet-04399db8294cd0293 subnet-0ef5970bb206ba8d6 subnet-0134f063a963ef06e"
                      stopOnTerminate: false
                      t2Unlimited: false
                      tenancy: Default
                      type: "c6g.4xlarge"
                      useEphemeralDevices: false
                    - ami: "ami-057958fcf37e192f1"
                      amiType:
                        unixData:
                          sshPort: "22"
                      associatePublicIp: false
                      connectBySSHProcess: false
                      connectionStrategy: PRIVATE_IP
                      customDeviceMapping: "/dev/xvda=:600:true:::encrypted"
                      deleteRootOnTermination: true
                      description: "jenkinsAgentNode-Jenkins-Agent-AL2023-X64-M54xlarge-Docker-Host"
                      ebsEncryptRootVolume: ENCRYPTED
                      ebsOptimized: false
                      hostKeyVerificationStrategy: OFF
                      idleTerminationMinutes: "60"
                      initScript: >
                        sudo dnf clean all && sudo rm -rf /var/cache/dnf && sudo dnf repolist &&
                        sudo dnf update --releasever=latest --skip-broken --exclude=openssh*
                        --exclude=docker* --exclude=gh* --exclude=openssl* -y && docker ps
                      labelString: "Jenkins-Agent-AL2023-X64-M54xlarge-Docker-Host"
                      launchTimeoutStr: "300"
                      maxTotalUses: 10
                      metadataEndpointEnabled: true
                      metadataHopsLimit: "2"
                      metadataTokensRequired: true
                      minimumNumberOfInstances: 0
                      minimumNumberOfSpareInstances: 4
                      mode: "EXCLUSIVE"
                      monitoring: false
                      numExecutors: 3
                      remoteAdmin: "ec2-user"
                      remoteFS: "/var/jenkins"
                      securityGroups: "jenkins-worker"
                      subnetId: "subnet-04399db8294cd0293 subnet-0ef5970bb206ba8d6 subnet-0134f063a963ef06e"
                      stopOnTerminate: false
                      t2Unlimited: false
                      tenancy: Default
                      type: "m5.4xlarge"
                      useEphemeralDevices: false
                      tags:
                        - name: Name
                          value: "Jenkins-Staging/AgentNode/Jenkins-Agent-AL2023-X64-M54xlarge-Docker-Host"
                        - name: type
                          value: "jenkinsAgentNode-Jenkins-Agent-AL2023-X64-M54xlarge-Docker-Host"
                      iamInstanceProfile: "arn:aws:iam::156041419073:instance-profile/opensearch-jenkins-staging-agent-node-role"
                    - ami: "ami-064a204f1888da70b"
                      amiType:
