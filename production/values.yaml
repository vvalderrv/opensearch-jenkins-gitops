---
# Name: production/values.yaml
# Purpose: Production environment Helm values for Jenkins wrapper chart configuration
# Description: Environment-specific overrides for production deployment including
# image versioning, resource allocation, JVM optimization, and JCasC variables.
# Inherits base configuration from base/jenkins/values.yaml.
#
# persistence.size: Production-appropriate storage allocation (16Gi)
# jenkins.controller.image: Production image tag and pull policy for reliability
# jenkins.controller.resources: Resource limits appropriate for production workloads
# jenkins.controller.javaOpts: JVM tuning for production memory allocation
# jenkins.controller.containerEnv: Environment variables for JCasC configuration
# jenkins.controller.ingress: External access configuration for production environment

# Production-specific persistence configuration
# Storage size configured in jenkins.persistence section below

# Jenkins subchart configuration overrides
# Inherits base configuration from: base/jenkins/values.yaml
jenkins:
  # Service account configuration for AWS IAM role assumption
  serviceAccount:
    annotations:
      "eks.amazonaws.com/role-arn": "arn:aws:iam::156041419073:role/jenkins-prod-irsa"

  controller:
    # Container image configuration for production environment
    # Uses specific commit SHA for production stability
    # Pull policy set to Always for latest security updates
    image:
      registry: "ghcr.io"
      repository: "lfit/jenkins"
      tag: "main-990a6cc"
      pullPolicy: "Always"

    # Lifecycle hooks to fix 1Password CLI directory permissions after fsGroup applies
    lifecycle:
      postStart:
        exec:
          command:
            - "/bin/sh"
            - "-c"
            # yamllint disable-line rule:line-length
            - "mkdir -p /var/jenkins_home/.config/op && chmod 700 /var/jenkins_home/.config/op && if [ -f /var/jenkins_home/.config/op/config ]; then chmod 600 /var/jenkins_home/.config/op/config; else echo '[INFO] /var/jenkins_home/.config/op/config does not exist, skipping chmod'; fi"
            # yamllint enable-line rule:line-length

    # Plugin management - use only plugins baked into image
    # Prevents plugin version conflicts in production environment
    installPlugins: false

    # Kubernetes health probe configuration for production environment
    # Increase startup probe timeout to accommodate Jenkins initialization with plugins
    # Default: 12 failures × 10s = 120s, Updated: 18 failures × 10s = 180s (3 minutes)
    probes:
      startupProbe:
        failureThreshold: 18

    # Jenkins Configuration as Code
    JCasC:
      defaultConfig: false
      configScripts:
        # OFFICIAL MULTIPLE ROOT KEYS PATTERN
        # Organizes configurations by root key type to eliminate merge conflicts
        # Based on jenkinsci/configuration-as-code-plugin official documentation

        jenkins-config: |
          jenkins:
            # Global environment variables available to all Jenkins jobs
            globalNodeProperties:
              - envVars:
                  env:
                    - key: "RELEASE_EMAIL"
                      value: '${JCASC_RELEASE_EMAIL:-noreply@opensearch.org}'
                    - key: "WORKSPACE_CLEANUP"
                      value: '${JCASC_WORKSPACE_CLEANUP:-true}'
                    - key: "DISABLE_DEFERRED_WIPEOUT"
                      value: '${JCASC_DISABLE_DEFERRED_WIPEOUT:-false}'
                    - key: "AWS_REGION"
                      value: '${JCASC_AWS_REGION:-us-west-2}'
                    - key: "GIT_BASE"
                      value: '${JCASC_GIT_BASE:-https://github.com}'
                    - key: "GIT_URL"
                      value: '${JCASC_GIT_URL:-https://github.com}'
                    - key: "GITHUB_API_URL"
                      value: '${JCASC_GITHUB_API_URL:-https://api.github.com}'
                    - key: "LANG"
                      value: '${JCASC_LANG:-C.UTF-8}'
                    - key: "CI_ENVIRONMENT"
                      value: '${JCASC_SILO}'
                    - key: "JENKINS_URL"
                      value: '${JCASC_JENKINS_URL}'
                    - key: "JCASC_GITHUB_CREDENTIALS_ID"
                      value: "github-token"
                    - key: "SAML_METADATA_URL"
                      value: '${SAML_METADATA_URL}'
                    - key: "SAML_LOGOUT_URL"
                      value: '${SAML_LOGOUT_URL}'

            # CSRF protection configuration
            crumbIssuer:
              standard:
                excludeClientIPFromCrumb: false

            # Disable "Remember me" for enhanced security
            disableRememberMe: true

            # SAML SSO authentication via Linux Foundation identity provider
            securityRealm:
              saml:
                binding: "urn:oasis:names:tc:SAML:2.0:bindings:HTTP-Redirect"
                displayNameAttributeName: "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"
                emailAttributeName: "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress"
                groupsAttributeName: "http://schemas.xmlsoap.org/claims/Group"
                idpMetadataConfiguration:
                  period: 60
                  url: "${SAML_METADATA_URL}"
                logoutUrl: "${SAML_LOGOUT_URL}"
                maximumAuthenticationLifetime: 86400

            # Authorization Strategy: Global Matrix Authorization
            # Admin access: lf-releng, lf-sysops groups from LF LDAP
            # Anonymous access: read-only for public CI transparency
            authorizationStrategy:
              globalMatrix:
                permissions:
                  # Anonymous read-only access
                  - "USER:Overall/Read:anonymous"
                  - "USER:Job/Discover:anonymous"
                  - "USER:Job/Read:anonymous"
                  - "USER:View/Read:anonymous"

                  # Admin groups (LF teams)
                  - "GROUP:Overall/Administer:lf-releng"
                  - "GROUP:Overall/Administer:lf-sysops"

                  # OpenSearch maintainers
                  - "GROUP:Overall/Administer:opensearch-github-opensearch-maintainers"

            # Kubernetes cloud configuration for dynamic build agents
            clouds:
              - kubernetes:
                  name: "kubernetes"
                  serverUrl: "${JCASC_KUBERNETES_URL:-https://kubernetes.default.svc.cluster.local}"
                  namespace: "${JCASC_KUBERNETES_NAMESPACE:-default}"
                  credentialsId: ""
                  jenkinsUrl: "${JCASC_KUBERNETES_JENKINS_URL:-http://jenkins:8080}"
                  jenkinsTunnel: "${JCASC_KUBERNETES_JENKINS_TUNNEL:-jenkins:50000}"
                  containerCap: 10
                  maxRequestsPerHostStr: "32"
                  retentionTimeout: 180
                  connectTimeout: 10
                  readTimeout: 20
                  waitForPodSec: 600
                  usageRestricted: false
                  garbageCollection:
                    timeout: 300
                  podLabels:
                    - key: "jenkins"
                      value: "slave"
                    - key: "app.kubernetes.io/managed-by"
                      value: "jenkins"
                    - key: "app.kubernetes.io/part-of"
                      value: "cicd"
                  templates:
                    - name: "default-agent"
                      label: "kubernetes"
                      nodeUsageMode: "NORMAL"
                      containers:
                        - name: "jnlp"
                          image: "jenkins/inbound-agent:latest"
                          args: "^${computer.jnlpmac} ^${computer.name}"
                          resourceRequestCpu: "200m"
                          resourceRequestMemory: "256Mi"
                          resourceLimitCpu: "500m"
              # EC2 cloud configuration for AWS-based build agents
              - amazonEC2:
                  name: "aws-ec2"
                  region: "us-west-2"
                  useInstanceProfileForCredentials: false
                  sshKeysCredentialsId: "opensearch-ec2-key"
                  templates:
                    - ami: "ami-0a0054390037a45f4"
                      amiType:
                        unixData:
                          sshPort: "22"
                      associatePublicIp: false
                      connectBySSHProcess: false
                      connectionStrategy: PRIVATE_IP
                      customDeviceMapping: "/dev/sda1=:300:true:::encrypted"
                      deleteRootOnTermination: true
                      description: "jenkinsAgentNode-Jenkins-Agent-Ubuntu2404-X64-M52xlarge-Docker-Builder"
                      ebsEncryptRootVolume: ENCRYPTED
                      ebsOptimized: false
                      hostKeyVerificationStrategy: OFF
                      idleTerminationMinutes: "60"
                      initScript: >
                        docker ps && sudo apt-get update -y && sudo env "DEBIAN_FRONTEND=noninteractive" apt-get upgrade -y &&
                        sudo update-alternatives --set "java" "/usr/lib/jvm/temurin-21-jdk-amd64/bin/java" && java -version
                      labelString: "Jenkins-Agent-Ubuntu2404-X64-M52xlarge-Docker-Builder"
                      launchTimeoutStr: "300"
                      maxTotalUses: 10
                      metadataEndpointEnabled: true
                      metadataHopsLimit: "2"
                      metadataTokensRequired: true
                      minimumNumberOfInstances: 0
                      minimumNumberOfSpareInstances: 1
                      mode: "EXCLUSIVE"
                      monitoring: false
                      numExecutors: 1
                      remoteAdmin: "ubuntu"
                      remoteFS: "/var/jenkins"
                      securityGroups: "jenkins-worker"
                      subnetId: "subnet-04399db8294cd0293 subnet-0ef5970bb206ba8d6 subnet-0134f063a963ef06e"
                      stopOnTerminate: false
                      t2Unlimited: false
                      tenancy: Default
                      type: "m5.2xlarge"
                      useEphemeralDevices: false
                      tags:
                        - name: Name
                          value: "Jenkins-Prod/AgentNode/Jenkins-Agent-Ubuntu2404-X64-M52xlarge-Docker-Builder"
                        - name: type
                          value: "jenkinsAgentNode-Jenkins-Agent-Ubuntu2404-X64-M52xlarge-Docker-Builder"
                      nodeProperties:
                        - envVars:
                            env:
                              - key: JENKINS_HOME_PATH
                                value: "/var/jenkins"
                              - key: JAVA8_HOME
                                value: "/usr/lib/jvm/temurin-8-jdk-amd64"
                              - key: JAVA11_HOME
                                value: "/usr/lib/jvm/temurin-11-jdk-amd64"
                              - key: JAVA14_HOME
                                value: "/usr/lib/jvm/adoptopenjdk-14-amd64"
                              - key: JAVA17_HOME
                                value: "/usr/lib/jvm/temurin-17-jdk-amd64"
                              - key: JAVA19_HOME
                                value: "/usr/lib/jvm/jdk-19"
                              - key: JAVA20_HOME
                                value: "/usr/lib/jvm/jdk-20"
                              - key: JAVA21_HOME
                                value: "/usr/lib/jvm/temurin-21-jdk-amd64"
                              - key: JAVA23_HOME
                                value: "/usr/lib/jvm/temurin-23-jdk-amd64"
                              - key: JAVA24_HOME
                                value: "/usr/lib/jvm/temurin-24-jdk-amd64"
                              - key: JAVA25_HOME
                                value: "/usr/lib/jvm/temurin-25-jdk-amd64"
                      iamInstanceProfile: "arn:aws:iam::156041419073:instance-profile/opensearch-jenkins-production-agent-node-role"
                    - ami: "ami-057958fcf37e192f1"
                      amiType:
                        unixData:
                          sshPort: "22"
                      associatePublicIp: false
                      connectBySSHProcess: false
                      connectionStrategy: PRIVATE_IP
                      customDeviceMapping: "/dev/xvda=:600:true:::encrypted"
                      deleteRootOnTermination: true
                      description: "jenkinsAgentNode-Jenkins-Agent-AL2023-X64-M54xlarge-Docker-Host"
                      ebsEncryptRootVolume: ENCRYPTED
                      ebsOptimized: false
                      hostKeyVerificationStrategy: OFF
                      idleTerminationMinutes: "60"
                      initScript: >
                        sudo dnf clean all && sudo rm -rf /var/cache/dnf && sudo dnf repolist &&
                        sudo dnf update --releasever=latest --skip-broken --exclude=openssh*
                        --exclude=docker* --exclude=gh* --exclude=openssl* -y && docker ps
                      labelString: "Jenkins-Agent-AL2023-X64-M54xlarge-Docker-Host"
                      launchTimeoutStr: "300"
                      maxTotalUses: 10
                      metadataEndpointEnabled: true
                      metadataHopsLimit: "2"
                      metadataTokensRequired: true
                      minimumNumberOfInstances: 0
                      minimumNumberOfSpareInstances: 1
                      mode: "EXCLUSIVE"
                      monitoring: false
                      numExecutors: 3
                      remoteAdmin: "ec2-user"
                      remoteFS: "/var/jenkins"
                      securityGroups: "jenkins-worker"
                      subnetId: "subnet-04399db8294cd0293 subnet-0ef5970bb206ba8d6 subnet-0134f063a963ef06e"
                      stopOnTerminate: false
                      t2Unlimited: false
                      tenancy: Default
                      type: "m5.4xlarge"
                      useEphemeralDevices: false
                      tags:
                        - name: Name
                          value: "Jenkins-Prod/AgentNode/Jenkins-Agent-AL2023-X64-M54xlarge-Docker-Host"
                        - name: type
                          value: "jenkinsAgentNode-Jenkins-Agent-AL2023-X64-M54xlarge-Docker-Host"
                      iamInstanceProfile: "arn:aws:iam::156041419073:instance-profile/opensearch-jenkins-production-agent-node-role"
                    - ami: "ami-064a204f1888da70b"
                      amiType:
                        unixData:
                          sshPort: "22"
                      associatePublicIp: false
                      connectBySSHProcess: false
                      connectionStrategy: PRIVATE_IP
                      customDeviceMapping: "/dev/xvda=:600:true:::encrypted"
                      deleteRootOnTermination: true
                      description: "jenkinsAgentNode-Jenkins-Agent-AL2023-Arm64-M6g4xlarge-Docker-Host"
                      ebsEncryptRootVolume: ENCRYPTED
                      ebsOptimized: false
                      hostKeyVerificationStrategy: OFF
                      idleTerminationMinutes: "60"
                      initScript: >
                        sudo dnf clean all && sudo rm -rf /var/cache/dnf && sudo dnf repolist &&
                        sudo dnf update --releasever=latest --skip-broken --exclude=openssh*
                        --exclude=docker* --exclude=gh* --exclude=openssl* -y && docker ps
                      labelString: "Jenkins-Agent-AL2023-Arm64-M6g4xlarge-Docker-Host"
                      launchTimeoutStr: "300"
                      maxTotalUses: 10
                      metadataEndpointEnabled: true
                      metadataHopsLimit: "2"
                      metadataTokensRequired: true
                      minimumNumberOfInstances: 0
                      minimumNumberOfSpareInstances: 1
                      mode: "EXCLUSIVE"
                      monitoring: false
                      numExecutors: 3
                      remoteAdmin: "ec2-user"
                      remoteFS: "/var/jenkins"
                      securityGroups: "jenkins-worker"
                      subnetId: "subnet-04399db8294cd0293 subnet-0ef5970bb206ba8d6 subnet-0134f063a963ef06e"
                      stopOnTerminate: false
                      t2Unlimited: false
                      tenancy: Default
                      type: "m6g.4xlarge"
                      useEphemeralDevices: false
                      tags:
                        - name: Name
                          value: "Jenkins-Prod/AgentNode/Jenkins-Agent-AL2023-Arm64-M6g4xlarge-Docker-Host"
                        - name: type
                          value: "jenkinsAgentNode-Jenkins-Agent-AL2023-Arm64-M6g4xlarge-Docker-Host"
                      iamInstanceProfile: "arn:aws:iam::156041419073:instance-profile/opensearch-jenkins-production-agent-node-role"

        credentials-config: |
          credentials:
            system:
              domainCredentials:
                - credentials:
                  # 1Password Service Account Token (standard string credential)
                  - string:
                      id: "opensearch-1password-service-account"
                      description: "1Password service account token for secret access"
                      secret: "${OPENSEARCH_ONEPASSWORD_SA_TOKEN}"

                  # GitHub Service Account Token for CI/CD Operations
                  - string:
                      id: "${GITHUB_CREDENTIALS_ID}"
                      description: "GitHub opensearch-jenkins service account token"
                      secret: "${OPENSEARCH_GITHUB_TOKEN}"

                  # SSH Private Key for OpenSearch EC2 Agents
                  - basicSSHUserPrivateKey:
                      scope: GLOBAL
                      id: "opensearch-ec2-key"
                      username: "ec2-user"
                      description: "SSH key for OpenSearch EC2 agents"
                      privateKeySource:
                        directEntry:
                          privateKey: "${OPENSEARCH_EC2_PRIVATE_KEY}"

                  # S3 Bucket Configuration for Artifact Storage (Production)
                  - string:
                      scope: GLOBAL
                      id: "s3-bucket-prod"
                      secret: "artifacts.s3.prod.opensearch.org"
                      description: "S3 bucket name for production artifacts"

                  - string:
                      scope: GLOBAL
                      id: "s3-bucket-public"
                      secret: "artifacts.s3.public.opensearch.org"
                      description: "S3 bucket name for public artifacts"

                  - string:
                      scope: GLOBAL
                      id: "s3-account-id"
                      secret: "156041419073"
                      description: "AWS account ID for S3 access"

                  - string:
                      scope: GLOBAL
                      id: "s3-region"
                      secret: "us-west-2"
                      description: "AWS region for S3 buckets"

        unclassified-config: |
          unclassified:
            1Password Config:
              config:
                opCLIPath: "/usr/local/bin"
                serviceAccountCredentialId: "opensearch-1password-service-account"

            # GitHub plugin configuration
            gitHubConfiguration:
              apiRateLimitChecker: ThrottleForNormalize

            gitHubPluginConfig:
              configs:
                - name: "opensearch-project"
                  credentialsId: "${GITHUB_CREDENTIALS_ID}"
              hookUrl: "${JENKINS_URL}/github-webhook/"

            # GitHub Pull Request Builder configuration
            ghprbTrigger:
              cron: "H/5 * * * *"
              githubAuth:
                - id: "opensearch-project-ghprb-auth"
                  serverAPIUrl: "${GITHUB_API_URL}"
                  credentialsId: "${GITHUB_CREDENTIALS_ID}"
                  description: "GitHub auth for opensearch-project PR builder"
              adminlist: ""
              manageWebhooks: false
              okToTestPhrase: ".*ok to test.*"
              retestPhrase: ".*test this please.*"
              skipBuildPhrase: ".*\\[skip ci\\].*"

        tool-config: |
          tool:
            # Java Development Kit configuration
            jdk:
              installations:
                - name: "jdk-17"
                  home: "/opt/java/openjdk"

            # Git version control system configuration
            git:
              installations:
                - name: "Default"
                  home: "git"

    # Resource allocation for production environment. Matches size of previous
    # c5.9xlarge controller instance (36 cpu, 72GB mem), slightly downscaled to
    # account for Kubernetes's cut of node resources.
    # (https://github.com/opensearch-project/opensearch-ci/blob/1.5.0/lib/compute/jenkins-main-node.ts#L121)
    resources:
      requests:
        cpu: 34
        memory: '68Gi'
      limits:
        cpu: 36
        memory: '70Gi'

    # JVM optimization for production environment
    # Memory settings aligned with resource limits above
    javaOpts: >-
      -XX:+UseG1GC
      -XX:+UseStringDeduplication
      -XX:+ParallelRefProcEnabled
      -XX:+DisableExplicitGC
      -XX:+UnlockExperimentalVMOptions
      -XX:+ExplicitGCInvokesConcurrent
      -XX:G1NewSizePercent=20
      -XX:+UnlockDiagnosticVMOptions
      -XX:G1MixedGCCountTarget=16
      -XX:G1MixedGCLiveThresholdPercent=90
      -XX:G1RSetUpdatingPauseTimePercent=5
      -Xms4g
      -Xmx16g

    # Environment variables for Jenkins container (JCasC configuration)
    # Variables consumed by: base/jenkins/jcasc_yamls/ configuration files
    # Environment-specific values for production deployment context
    containerEnv:
      # System Configuration (01-global-env-vars.yaml)
      - name: JCASC_SILO
        value: "production"
      - name: JCASC_JENKINS_URL
        value: "https://jenkins.opensearch.cluster.linuxfound.info/"
      - name: JENKINS_URL
        value: "https://jenkins.opensearch.cluster.linuxfound.info/"
      - name: JCASC_LOCATION_URL
        value: ""
      - name: JCASC_LOCATION_ADMINADDRESS
        value: ""
      - name: JCASC_MASTER_LABELS
        value: "prod-controller"
      - name: JCASC_RESOURCE_ROOT_URL
        value: ""

      # Build and Performance Configuration
      - name: JCASC_BUILD_TIMEOUT
        value: "7200"
      - name: JCASC_MAVEN_OPTS
        value: "-Xmx4096m -XX:MaxMetaspaceSize=1024m"
      - name: JCASC_NODE_OPTIONS
        value: "--max-old-space-size=8192"
      - name: JCASC_SCM_POLLING_THREADCOUNT
        value: "10"

      # Integration Configuration (placeholders for future configuration)
      - name: JCASC_LOG_LEVEL
        value: "ERROR"
      - name: JCASC_ARTIFACTORY_URL
        value: ""
      - name: JCASC_DOCKER_REGISTRY
        value: ""
      - name: GITHUB_CREDENTIALS_ID
        value: "github-token"
      - name: JCASC_S3_BUCKET
        value: ""
      - name: JCASC_CDN_URL
        value: ""
      - name: JCASC_ARTIFACTS_RETENTION_DAYS
        value: ""
      - name: JCASC_ECR_REGISTRY_URL
        value: ""

      # Security Configuration (02-security.yaml integration)
      - name: JCASC_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            name: jenkins-lf-admin
            key: admin-password

      # SAML Configuration
      - name: SAML_METADATA_URL
        value: "https://sso.linuxfoundation.org/samlp/metadata/BLgSYAt8E0oXf5EJSWxeuAnUP2JZUg46"
      - name: SAML_LOGOUT_URL
        value: "https://sso.linuxfoundation.org/samlp/BLgSYAt8E0oXf5EJSWxeuAnUP2JZUg46/logout"

      # Opensearch 1Password Service Account Token (ESO-managed from 1Password)
      - name: OPENSEARCH_ONEPASSWORD_SA_TOKEN
        valueFrom:
          secretKeyRef:
            name: opensearch-1password-sa-token
            key: token

      # EC2 SSH Private Key (ESO-managed from 1Password)
      - name: OPENSEARCH_EC2_PRIVATE_KEY
        valueFrom:
          secretKeyRef:
            name: opensearch-jenkins-ec2-key
            key: private-key

      # GitHub Token (ESO-managed from 1Password)
      - name: OPENSEARCH_GITHUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: opensearch-jenkins-github-token
            key: password

      # Kubernetes Cloud Configuration (07-cloud-agents.yaml integration)
      - name: JCASC_KUBERNETES_URL
        value: "https://kubernetes.default.svc.cluster.local"
      - name: JCASC_KUBERNETES_NAMESPACE
        value: "jenkins-prod"
      - name: JCASC_KUBERNETES_JENKINS_URL
        value: "http://jenkins-prod.jenkins-prod.svc.cluster.local:8080"
      - name: JCASC_KUBERNETES_JENKINS_TUNNEL
        value: "jenkins-prod-agent.jenkins-prod.svc.cluster.local:50000"

    # External access configuration for production environment
    # Provides public access for production workflows
    ingress:
      enabled: true
      apiVersion: networking.k8s.io/v1
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
      hostName: jenkins.opensearch.cluster.linuxfound.info
      path: /
      tls:
        - secretName: jenkins-production-tls
          hosts:
            - jenkins.opensearch.cluster.linuxfound.info

  persistence:
    enabled: true
    storageClass: "auto-ebs-sc"
    size: "100Gi"
